<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformación 3D con IA | Registro</title>
    <meta http-equiv="refresh" content="0; url=https://forms.gle/yYCLa7GziJ26PWqi9">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid #111;
            border-top: 4px solid #0066ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .card {
            padding: 20px;
        }
        
        a {
            color: #0066ff;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0066ff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        
        a:hover {
            background: #0066ff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader"></div>
        <p>Sincronizando con el portal de registro...</p>
        <p style="font-size: 0.8rem; opacity: 0.6;">Si no eres redirigido automáticamente, haz clic abajo:</p>
        <br>
        <a href="https://forms.gle/yYCLa7GziJ26PWqi9">INGRESAR AL FORMULARIO</a>
    </div>

    <script>
        // Refuerzo de redirección por JavaScript
        window.location.href = "https://forms.gle/yYCLa7GziJ26PWqi9";
    </script>
</body>
</html>
