<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transformación 3D | Sincronizando</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog">
    
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            text-align: center;
            overflow: hidden;
        }

        .card { padding: 20px; max-width: 480px; width: 90%; z-index: 1; }

        .logo-loader {
            width: 120px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 8px rgba(0, 102, 255, 0.4));
        }

        .matrix-text {
            color: #0066ff;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        .instruction-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 20px;
        }

        .highlight { color: #0066ff; font-weight: bold; }

        /* Contenedor de los 3 Días imitando la estética de la App */
        .days-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            margin: 20px auto;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .day-row { display: flex; align-items: center; gap: 10px; }
        .day-badge {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid #0066ff;
            color: #0066ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
        }

        .progress-wrapper {
            width: 100%; height: 2px;
            background: #111;
            position: relative; overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            position: absolute; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #0066ff, transparent);
            animation: loading 2s infinite;
        }

        .btn-manual {
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes loading { 100% { left: 100%; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.postimg.cc/Dwqrq0gz/Logo_app_blanco.png" class="logo-loader" alt="C3D Logo">
        
        <div class="matrix-text">Sincronizando Módulos IA...</div>

        <div class="instruction-text">
            Estamos <span class="highlight">RESERVANDO TU CUPO</span> para el entrenamiento.
            <br>Valida tus datos a continuación para acceder a:
        </div>

        <div class="days-container">
            <div class="day-row">
                <span class="day-badge">DÍA 1</span> <span>NUTRICIÓN & IA</span>
            </div>
            <div class="day-row">
                <span class="day-badge">DÍA 2</span> <span>FINANZAS 3D</span>
            </div>
            <div class="day-row">
                <span class="day-badge">DÍA 3</span> <span>MENTALIDAD DE ÉXITO</span>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog" class="btn-manual">
            ¿Problemas de conexión? Clic aquí
        </a>
    </div>

    <script>
        var urlFinal = "https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog";

        function fastRedirect() {
            try {
                // Pequeño delay de 800ms para que alcancen a leer el mensaje de reserva
                setTimeout(function() {
                    if (window.top !== window.self) {
                        window.top.location.replace(urlFinal);
                    } else {
                        window.location.replace(urlFinal);
                    }
                }, 800);
            } catch (e) {
                window.location.href = urlFinal;
            }
        }

        // Iniciar proceso
        fastRedirect();
    </script>
</body>
</html>
