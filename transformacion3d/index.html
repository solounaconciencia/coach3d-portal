<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformación 3D con IA | Registro</title>
    
    <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid #111;
            border-top: 4px solid #0066ff;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .card { padding: 20px; max-width: 90%; }
        
        .btn-manual {
            display: inline-block;
            color: #0066ff;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #0066ff;
            padding: 12px 25px;
            border-radius: 8px;
            transition: 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader"></div>
        <p style="letter-spacing: 1px; font-size: 0.9rem;">Sincronizando con el portal de registro...</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog" class="btn-manual">
            Ingresar Manualmente
        </a>
    </div>

    <script>
        var urlFinal = "https://docs.google.com/forms/d/e/1FAIpQLSfVXXMpjUNLvtMtprEQLLW-V3wSo4lPiAYw_tr22w2y4NXXxQ/viewform?usp=dialog";

        // Redirección de "Fuerza Bruta" para saltar frames de Instagram/GitHub
        function fastRedirect() {
            try {
                if (window.top !== window.self) {
                    window.top.location.replace(urlFinal);
                } else {
                    window.location.replace(urlFinal);
                }
            } catch (e) {
                window.location.href = urlFinal;
            }
        }

        // Ejecución inmediata
        fastRedirect();

        // Respaldo por si el navegador detiene el proceso de carga
        setTimeout(fastRedirect, 500);
    </script>
</body>
</html>
