<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach 3D | Sincronizando</title>
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec">
    
    <style>
        body { 
            background-color: #000; 
            color: #00fbff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; /* Usamos una fuente de sistema para carga instantánea */
        }
        .matrix-text {
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="matrix-text">
        <p>Estableciendo conexión segura...</p>
    </div>

    <script>
        (function() {
            // URL Actualizada que me entregaste
            var urlWebApp = "https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec";

            function redirect() {
                // window.location.replace es mejor que .href porque no deja rastro en el historial 
                // y evita que el usuario quede atrapado al presionar "atrás"
                if (window.top !== window.self) {
                    window.top.location.replace(urlWebApp);
                } else {
                    window.location.replace(urlWebApp);
                }
            }

            // Ejecutamos inmediatamente sin esperar al window.onload para ganar milisegundos
            redirect();

            // Respaldo de seguridad por si el navegador bloquea el salto inicial
            setTimeout(redirect, 500);
        })();
    </script>
</body>
</html>
