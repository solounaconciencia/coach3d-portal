<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach 3D | Registro de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- RECUPERANDO TU ESTÉTICA MATRIX/APP --- */
        :root { --cyan: #00fbff; --blue: #0066ff; }
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100%; width: 100%; overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Eliminado el Loader genérico. Carga directa. */

        /* --- CONTENEDOR DE LA APP (Tu diseño original) --- */
        #main-app { 
            width: 90%; max-width: 450px; text-align: center; 
            animation: fadeIn 0.8s ease;
        }
        .event-card { 
            background: rgba(10, 10, 10, 0.95); border: 1px solid var(--blue);
            padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 102, 255, 0.2);
            position: relative;
        }

        /* RECUPERANDO EL LOGO DE LA APP */
        .logo-app {
            width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--cyan));
        }

        /* RECUPERANDO EL VIDEO (Centrado y 50%) */
        .video-box { display: flex; justify-content: center; margin-bottom: 25px; }
        .video-box iframe { 
            width: 50%; height: 160px; border-radius: 12px; border: 1px solid #222;
        }

        /* ESTILOS DE INPUTS MATRIX */
        input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #333; background: #0a0a0a; color: white; box-sizing: border-box; 
            font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 251, 255, 0.2); outline: none; }

        /* BOTÓN MATRIX */
        .btn-register {
            width: 100%; padding: 16px; background: var(--blue); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-top: 20px; font-family: 'Orbitron'; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-register:hover { background: #0052cc; box-shadow: 0 0 15px var(--blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="main-app">
        <div class="event-card">
            <img src="https://i.postimg.cc/Dwqrq0gz/Logo_app_blanco.png" class="logo-app" alt="C3D Logo">
            
            <h2 style="font-family: 'Orbitron'; color: var(--cyan); font-size: 1.1rem; margin-bottom: 20px; text-transform: uppercase;">VALIDA TU ACCESO AL PORTAL</h2>
            
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <input type="text" id="u-nombre" placeholder="NOMBRE COMPLETO">
            <input type="email" id="u-email" placeholder="TU MEJOR CORREO">
            
            <button class="btn-register" id="btn-submit" onclick="saveToSupabase()">CONFIRMAR REGISTRO</button>
            <p style="font-size: 0.65rem; opacity: 0.5; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px;">Conexión Encriptada vía Supabase (AWS Sao Paulo)</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU SUPABASE (Ya con tus credenciales correctas)
        const SUPABASE_URL = 'https://btupljtijgupyldxwile.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_eMen1iFEwGk8QspzXS1tmA_2uW2YAS9'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveToSupabase() {
            const btn = document.getElementById('btn-submit');
            const nombre = document.getElementById('u-nombre').value.trim();
            const email = document.getElementById('u-email').value.trim();

            if(!nombre || !email) return alert("Por favor completa los datos");

            btn.innerText = "SINCRONIZANDO...";
            btn.disabled = true;

            // Guardado directo en la tabla 'registros'
            const { error } = await _supabase
                .from('registros')
                .insert([{ nombre: nombre, email: email, evento_id: 'ABRIL_3D' }]);

            if (error) {
                alert("Error de conexión: " + error.message);
                btn.innerText = "REINTENTAR";
                btn.disabled = false;
            } else {
                // REDIRECCIÓN FINAL (Cambia esto por tu URL de WhatsApp o Gracias)
                window.location.href = "https://coach3dlatam.app/gracias"; 
            }
        }
    </script>
</body>
</html>
