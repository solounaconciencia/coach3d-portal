<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach 3D | Sincronizando</title>
    
    <style>
        body, html { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Estética Matrix para la transición */
        .matrix-text {
            color: #00fbff; 
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: pulse 1.5s infinite;
            z-index: 1;
            position: absolute;
        }

        /* AJUSTE QUIRÚRGICO: Ocultamos la franja celeste de Google Workspace */
        iframe {
            position: absolute;
            top: -45px; /* Sube el frame para dejar la barra fuera del visor */
            left: 0;
            width: 100%;
            height: calc(100% + 45px); /* Compensa el movimiento para no dejar espacios vacíos */
            border: none;
            z-index: 2; 
            background-color: transparent;
            visibility: hidden; /* Se mantiene oculto mientras carga para mostrar el texto Matrix */
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="matrix-text" id="loader-text">
        <p>Estableciendo conexión segura...</p>
    </div>

    <iframe 
        id="portal-frame"
        src="https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec" 
        allow="camera; microphone; clipboard-read; clipboard-write">
    </iframe>

    <script>
        (function() {
            var frame = document.getElementById('portal-frame');
            var loaderText = document.getElementById('loader-text');

            // EVENTO DE CARGA: Muestra el portal solo cuando Google responde
            frame.onload = function() {
                frame.style.visibility = 'visible';
                loaderText.style.display = 'none';
                console.log("Portal Coach 3D Sincronizado con Workspace.");
            };

            // SEGUNDA CAPA DE SEGURIDAD (ANTI-BLOQUEO MULTICUENTA):
            // Si pasan 5 segundos y no ha cargado (falla de cookies de Google), fuerza un refresco del iFrame
            setTimeout(function() {
                if (frame.style.visibility !== 'visible') {
                    console.warn("Reintentando conexión por latencia de sesión...");
                    frame.src = frame.src; 
                }
            }, 5000);
        })();
    </script>
</body>
</html>
