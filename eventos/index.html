<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach 3D | Sincronizando</title>
    <style>
        body { background-color: #000; color: #00fbff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <p>Cargando portal seguro...</p>
    </div>

    <script>
        (function() {
            var urlWebApp = "https://script.google.com/macros/s/AKfycbxaI3uOiJRPCAg5h9RxSemP019bdShRMWUOOcr5rvkGTjL9KMWK85pnilXsYV30hc-c6A/exec";
            var urlFinal = "https://accounts.google.com/AccountChooser?continue=" + encodeURIComponent(urlWebApp);

            // ESTO ES LO IMPORTANTE:
            // Si la página está dentro de un iframe, forzamos a la ventana principal (top) a cambiar
            if (window.top !== window.self) {
                window.top.location.replace(urlFinal);
            } else {
                window.location.replace(urlFinal);
            }
        })();
    </script>
</body>
</html>
