<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach 3D | Sincronizando</title>
    
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec">
    
    <style>
        body, html { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Estética Matrix para la transición */
        .matrix-text {
            color: #00fbff; 
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: pulse 1.5s infinite;
            z-index: 1;
            position: absolute;
        }

        /* El iFrame: Ocultamos la barra celeste de Google (-45px) */
        iframe {
            position: absolute;
            top: -45px; 
            left: 0;
            width: 100%;
            height: calc(100% + 45px); 
            border: none;
            z-index: 2; /* Se coloca sobre el texto una vez carga */
            background-color: transparent;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="matrix-text">
        <p>Estableciendo conexión segura...</p>
    </div>

    <iframe 
        id="portal-frame"
        src="https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec" 
        allow="camera; microphone; clipboard-read; clipboard-write">
    </iframe>

    <script>
        (function() {
            var urlWebApp = "https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec";

            function redirect() {
                // Forzamos salida de frames para evitar conflictos de cookies y multicuenta
                try {
                    if (window.top !== window.self) {
                        window.top.location.replace(urlWebApp);
                    } else {
                        window.location.replace(urlWebApp);
                    }
                } catch (e) {
                    // Si el navegador bloquea el salto top, lo intentamos en el frame actual
                    window.location.href = urlWebApp;
                }
            }

            // Ejecución de salto inmediata
            redirect();

            // Respaldo de seguridad
            setTimeout(redirect, 600);
        })();
    </script>
</body>
</html>
