<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach 3D | Sincronizando Reserva</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            background-color: #000; 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white;
        }

        /* Contenedor del Loader que imita el Hub del Evento */
        #loader-container {
            text-align: center;
            z-index: 1;
            padding: 30px;
            max-width: 450px;
            animation: fadeIn 0.8s ease-in-out;
        }

        .logo-loader {
            width: 140px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(0, 251, 255, 0.4));
        }

        .matrix-text {
            color: #00fbff; 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        .instruction-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        .highlight { color: #00fbff; font-weight: bold; }

        /* Barra de progreso tecnológica */
        .progress-wrapper {
            width: 100%;
            height: 3px;
            background: #111;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .progress-bar {
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00fbff, transparent);
            animation: loading 2.5s infinite;
        }

        /* AJUSTE QUIRÚRGICO: Ocultamos la franja celeste de Google Workspace */
        iframe {
            position: absolute;
            top: -45px; 
            left: 0;
            width: 100%;
            height: calc(100% + 45px); 
            border: none;
            z-index: 2; 
            background-color: #000;
            visibility: hidden; 
        }

        @keyframes loading { 100% { left: 100%; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader-container">
        <img src="https://i.postimg.cc/Dwqrq0gz/Logo_app_blanco.png" class="logo-loader" alt="C3D Logo">
        
        <div class="matrix-text">
            Sincronizando con el portal...
        </div>

        <div class="instruction-text">
            <p>Estamos <span class="highlight">RESERVANDO TU CUPO</span> temporalmente.</p>
            <p style="font-size: 0.9rem; opacity: 0.9;">No cierres esta ventana. A continuación, valida tu <b>Nombre</b> y <b>Email</b> para confirmar tu lugar en el evento.</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>
        <p style="font-size: 0.65rem; opacity: 0.5; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase;">Estableciendo conexión encriptada</p>
    </div>

    <iframe 
        id="portal-frame"
        src="https://script.google.com/macros/s/AKfycby2SS_WMBwV8-7Y9GHCvksJAuQRWHYcVS21-KDeQtO5sZQGII6rTJD204q_5XRH1zhXNQ/exec" 
        allow="camera; microphone; clipboard-read; clipboard-write">
    </iframe>

    <script>
        (function() {
            var frame = document.getElementById('portal-frame');
            var loader = document.getElementById('loader-container');

            // Muestra el portal solo cuando la App Script está lista
            frame.onload = function() {
                // Pequeño retardo de salida para suavizar la transición visual
                setTimeout(function() {
                    frame.style.visibility = 'visible';
                    loader.style.display = 'none';
                    console.log("Portal Coach 3D Sincronizado.");
                }, 500); 
            };

            // CAPA DE SEGURIDAD ANTI-LATENCIA
            setTimeout(function() {
                if (frame.style.visibility !== 'visible') {
                    console.warn("Reintentando conexión...");
                    frame.src = frame.src; 
                }
            }, 5000);
        })();
    </script>
</body>
</html>
