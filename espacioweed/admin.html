<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANDO CENTRAL | Espacio Weed</title>
    
<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@300;400;600;700&display=swap');

:root {
  --neon-green: #2ecc71;
  --amber: #f1c40f;
  --cian: #00ffff;
  --bg-space: #020204;
  --glass: rgba(255, 255, 255, 0.05);
  --font-main: 'Montserrat', sans-serif;
  --font-brand: 'Orbitron', sans-serif;
  --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* 1. RESET Y BASE */
* { box-sizing: border-box; }

body {
  background: var(--bg-space);
  color: white;
  font-family: var(--font-main);
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  min-height: 100vh;
}

/* 2. FONDO GALÁCTICO DEFINITIVO */
#star-canvas {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  background: radial-gradient(circle at center, #1B2735 0%, #020204 100%);
  overflow: hidden;
}

/* Capa de estrellas real (50 estrellas blancas) */
#star-canvas::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 3px; height: 3px;
  background: transparent;
  /* Aquí están tus estrellas */
  box-shadow: 15vw 10vh #fff, 35vw 45vh #fff, 65vw 15vh #fff, 85vw 85vh #fff, 45vw 95vh #fff, 25vw 75vh #fff, 55vw 35vh #fff, 10vw 80vh #fff, 90vw 10vh #fff, 40vw 30vh #fff, 70vw 60vh #fff, 20vw 20vh #fff, 80vw 40vh #fff, 30vw 90vh #fff, 60vw 10vh #fff, 5vw 40vh #fff, 95vw 60vh #fff, 50vw 50vh #fff, 12vw 12vh #fff, 88vw 88vh #fff, 22vw 66vh #fff, 77vw 33vh #fff, 44vw 11vh #fff, 66vw 99vh #fff, 33vw 55vh #fff, 11vw 77vh #fff, 99vw 22vh #fff;
  opacity: 0.6;
  animation: moveStars 100s linear infinite;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-100vh); }
}

/* 6. CORRECCIÓN DEL MENÚ DESPLEGABLE (DROPDOWN) */
.dropdown { position: relative; display: inline-block; }

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #0a0a0c;
  min-width: 220px;
  box-shadow: 0px 8px 16px rgba(0,255,255,0.4); /* Sombra más fuerte para resaltar sobre el slider */
  z-index: 20000; /* Nivel máximo de órbita */
  border: 1px solid var(--cian);
  border-radius: 8px;
  margin-top: 0;
  padding: 10px 0;
}

.dropdown-content a {
  color: white !important;
  padding: 12px 20px !important;
  text-decoration: none;
  display: block;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  text-align: left;
}

.dropdown-content a:hover {
  background-color: rgba(0, 255, 255, 0.1);
  color: var(--amber) !important;
}

/* Mostrar al pasar el mouse */
.dropdown:hover .dropdown-content {
  display: block;
}

/* Eliminar el cuadro gris feo si se queda pegado */
.skeleton-loader {
  background: rgba(255,255,255,0.05);
  width: 100%; height: 100%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 0.1; }
  100% { opacity: 0.3; }
}

/* 3. BARRA SUPERIOR (TOP BAR) - CÁPSULAS ESTÁTICAS */
.top-bar {
  position: fixed;
  top: 0; width: 100%;
  background: #000;
  border-bottom: 1px solid rgba(0, 255, 255, 0.15);
  z-index: 5000;
  padding: 6px 0;
}

.top-bar-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
}

.trust-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 4px 14px;
  border-radius: 4px;
  font-size: 0.65rem;
  color: #bbb;
  display: flex;
  align-items: center;
  gap: 7px;
  letter-spacing: 0.5px;
  /* Estático según auditoría */
}

.wa-link { 
  color: var(--cian) !important; 
  cursor: pointer; 
}

/* 4. HEADER Y NAVEGACIÓN */
.header-wrap {
  margin-top: 45px;
  padding: 30px 0;
  background: #000;
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(46, 204, 113, 0.2);
  position: relative; /* Vital para que el z-index funcione */
  z-index: 9000;      /* Nivel superior al slider */
}

.logo-area { text-align: center; margin-bottom: 25px; }
.main-logo { 
  width: 170px;  
  transition: var(--transition);
}

.main-nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 40px;
  margin: 0;
  padding: 0;
  font-family: var(--font-brand);
  font-size: 0.75rem;
  letter-spacing: 2px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  transition: var(--transition);
  opacity: 0.75;
}

.nav-links a:hover {
  color: var(--cian);
  opacity: 1;
  text-shadow: 0 0 10px var(--cian);
}

.search-container {
  width: 100%;
  max-width: 450px;
  position: relative;
}

#main-search {
  width: 100%;
  padding: 12px 20px;
  border-radius: 30px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(0, 255, 255, 0.2);
  color: white;
  outline: none;
  font-family: var(--font-main);
  font-size: 0.9rem;
  transition: var(--transition);
}

#main-search:focus {
  border-color: var(--amber);
  box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
}

.search-icon {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.3);
}

/* 5. SLIDER DESTACADOS - CÁPSULA DE ACCESO DIRECTO */
.slider-container {
  width: 100%;
  height: 400px; /* Altura fija para la cápsula */
  position: relative;
  overflow: hidden;
  background: transparent; /* El fondo lo da la cápsula */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.slide {
  position: absolute;
  width: 90%; /* Caja más pequeña que el contenedor */
  max-width: 800px;
  height: 90%;
  display: flex;
  align-items: center;
  justify-content: space-between; /* Imagen izquierda, texto derecha */
  opacity: 0;
  transition: opacity 1s ease-in-out, transform 0.5s ease-out;
  background: var(--glass);
  border: 2px solid var(--neon-green);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  padding: 30px;
  box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
  transform: translateX(50px); /* Efecto de entrada */
  pointer-events: none;
}

.slide.active { 
  opacity: 1; 
  transform: translateX(0);
  pointer-events: auto;
  z-index: 10;
}

/* Imagen a la izquierda (Neuro-Marketing) */
.img-slide {
  width: 40%;
  height: 100%;
  object-fit: contain; /* No recorta la imagen, la ajusta */
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
}

/* Texto y Acciones a la derecha */
.slide-content {
  width: 55%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: left;
}

.slide-content h2 { 
  font-family: var(--font-brand); 
  color: var(--amber); 
  margin: 0; 
  font-size: 0.9rem; 
  letter-spacing: 2px;
}

.slide-content h1 { 
  font-family: var(--font-brand); 
  font-size: 1.8rem; 
  color: white; 
  margin: 5px 0 15px 0; 
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.slide-content p {
  color: #ccc;
  font-size: 0.85rem;
  line-height: 1.5;
  margin-bottom: 20px;
  opacity: 0.8;
}

/* Botón de compra rápido en el Banner */
.btn-banner-buy {
  background: var(--neon-green);
  color: black;
  border: none;
  padding: 12px 25px;
  border-radius: 5px;
  font-family: var(--font-brand);
  font-weight: bold;
  font-size: 0.75rem;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.btn-banner-buy:hover {
  background: white;
  transform: scale(1.05);
}

/* CONTROLES DE NAVEGACIÓN (FLECHAS) */
.slider-prev, .slider-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: var(--cian);
  border: 1px solid var(--cian);
  font-size: 1.5rem;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 100;
  transition: 0.3s;
}

.slider-prev:hover, .slider-next:hover {
  background: var(--cian);
  color: black;
}

.slider-prev { left: 10px; }
.slider-next { right: 10px; }

/* MOBILE FIX */
@media (max-width: 768px) {
  .slider-container { height: 520px; padding: 10px; }
  .slide { flex-direction: column; height: 96%; padding: 15px; justify-content: flex-start; gap: 5px; left: 5%; pointer-events: none;}
  .img-slide { width: auto; max-height: 180px; object-fit: contain; margin-bottom: 5px; flex-shrink: 0; }
  .slide-content { width: 100%; text-align: center; }
  .slide-content h1 { font-size: 1.2rem; margin: 5px 0; }
  .slide-content p { font-size: 0.75rem; line-height: 1.2; margin-bottom: 10px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .slide-content h1 { font-size: 1.4rem; }
  .slider-prev, .slider-next { font-size: 1rem; padding: 8px 12px; }
}

/* 6. CATEGORÍAS DINÁMICAS */
.category-filter-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  padding: 25px;
  background: rgba(0,0,0,0.4);
}

.cat-btn {
  background: transparent;
  border: 1px solid var(--cian);
  color: var(--cian);
  padding: 7px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-brand);
  font-size: 0.7rem;
  transition: var(--transition);
}

.cat-btn:hover {
  background: var(--cian);
  color: black;
  box-shadow: 0 0 15px var(--cian);
}

/* 7. VITRINA DE PRODUCTOS (GRID) */
.content-wrapper { padding: 40px 20px; max-width: 1300px; margin: 0 auto; }

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 30px;
}

.product-card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  background: var(--glass);
  border: 1px solid rgba(255,255,255,0.05);
  transition: var(--transition);
}

.product-card:hover {
  border-color: var(--neon-green);
  transform: translateY(-10px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.product-card img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  transition: transform 0.8s ease;
}

.product-card:hover img { transform: scale(1.1); }

.more-info-btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--amber);
  color: black;
  padding: 10px 20px;
  border-radius: 5px;
  font-family: var(--font-brand);
  font-size: 0.65rem;
  opacity: 0;
  transition: var(--transition);
}

.product-card:hover .more-info-btn { opacity: 1; }

.scarcity-label {
  position: absolute;
  top: 15px; left: 15px;
  background: #e74c3c;
  color: white;
  padding: 3px 10px;
  font-size: 0.6rem;
  font-weight: bold;
  border-radius: 3px;
  z-index: 5;
}

/* 8. CARRITO SIDEBAR */
.cart-sidebar {
  position: fixed;
  top: 0; right: -400px;
  width: 380px; height: 100%;
  background: #08080a;
  border-left: 1px solid var(--cian);
  z-index: 100000;
  transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
  padding: 30px;
  display: flex;
  flex-direction: column;
}

.cart-sidebar.active { right: 0; }

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--glass);
  padding-bottom: 20px;
}

.cart-header h3 { font-family: var(--font-brand); margin: 0; letter-spacing: 2px; }
.close-cart {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 45px;         /* Área de clic ampliada para pulgares */
  height: 45px;
  display: flex;       /* Centrado perfecto */
  align-items: center;
  justify-content: center;
  font-size: 32px;     /* 'X' más grande y clara */
  cursor: pointer;
  color: var(--neon-green); /* Color de marca activo */
  background: rgba(0, 0, 0, 0.5); /* Fondo oscuro para resaltar sobre cualquier imagen */
  border: 1px solid rgba(46, 204, 113, 0.3);
  border-radius: 50%;  /* Botón circular */
  transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2000;       /* Siempre por encima de todo */
  line-height: 1;
  user-select: none;   /* Evita seleccionar el texto por error */
}
.close-cart:hover {
  background: var(--neon-green);
  color: #000 !important;
  box-shadow: 0 0 20px var(--neon-green);
  transform: rotate(90deg) scale(1.1); /* Efecto visual dinámico */
}

.cart-items-container {
  flex: 1;
  overflow-y: auto;
  margin: 25px 0;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px dotted rgba(255,255,255,0.1);
}

.btn-qty {
  background: #222; border: 1px solid #444; color: white;
  width: 25px; height: 25px; cursor: pointer; border-radius: 3px;
}

.btn-del {
  background: none; border: none; color: #e74c3c; cursor: pointer; margin-left: 10px;
}

.cart-footer {
  border-top: 1px solid var(--cian);
  padding-top: 20px;
}

.cart-total-box {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-brand);
  font-size: 1.3rem;
  color: var(--amber);
  margin-bottom: 20px;
}

.btn-checkout {
  width: 100%;
  padding: 18px;
  background: var(--neon-green);
  color: black;
  border: none;
  border-radius: 8px;
  font-family: var(--font-brand);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn-checkout:hover { background: white; transform: scale(1.02); }

/* 9. MODAL DETALLE */
.modal {
  display: none; 
  position: fixed; 
  z-index: 99999 !important; /* Por encima de todo, incluso del carrito */
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  background-color: rgba(0,0,0,0.8); /* Fondo oscuro para enfocar la mente */
  backdrop-filter: blur(8px); /* Efecto neuro-relajante */
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--glass);
  border: 1px solid var(--neon-green);
  margin: auto;
  padding: 25px;
  width: 90%; /* Ocupa el 90% en móviles */
  max-width: 500px; /* Pero nunca más de 500px en PC */
  border-radius: 15px;
  position: relative;
  box-sizing: border-box; /* CRÍTICO: Evita que el padding empuje los bordes hacia afuera */
}

.modal-flex { display: flex; gap: 40px; flex-wrap: wrap; }
.modal-img { width: 350px; border-radius: 15px; }

.price-box {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 10px;
  margin: 20px 0;
}

.precio-old { text-decoration: line-through; opacity: 0.5; font-size: 1rem; margin-right: 15px; }
.precio-promo { color: var(--amber); font-weight: bold; font-size: 1.8rem; font-family: var(--font-brand); }

/* 10. WHATSAPP BUBBLE */
.wa-bubble {
  position: fixed;
  bottom: 30px; right: 30px;
  width: 65px; height: 65px;
  z-index: 5500;
  cursor: pointer;
  transition: var(--transition);
}

.wa-bubble:hover { transform: scale(1.15) rotate(10deg); }
.wa-bubble img { width: 100%; filter: drop-shadow(0 0 10px rgba(46, 204, 113, 0.4)); }

/* 11. TOAST NOTIFICATION */
.toast-notification {
  position: fixed;
  bottom: -60px; left: 50%;
  transform: translateX(-50%);
  background: var(--neon-green);
  color: black;
  padding: 12px 30px;
  border-radius: 50px;
  font-weight: bold;
  font-family: var(--font-brand);
  font-size: 0.8rem;
  z-index: 200000 !important;
  transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.toast-notification.show { bottom: 110px; }

/* 12. RESPONSIVE DESIGN (MOBILE) */
@media (max-width: 768px) {
  .top-bar-container { gap: 6px; }
  .trust-card { font-size: 0.55rem; padding: 4px 8px; }
  
  .main-logo { width: 130px; }
  .nav-links { gap: 15px; font-size: 0.65rem; flex-wrap: wrap; justify-content: center; }
  
  .product-grid { grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
  
  .cart-sidebar { width: 100%; right: -100%; }
  
  .modal-img { width: 100%; }
  .modal-content { margin: 10px; padding: 20px; }
}
.section-title {
  text-align: center;
  font-family: var(--font-brand);
  color: var(--cian);
  font-size: 1.8rem;
  margin-bottom: 30px;
  text-transform: uppercase;
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
  border-bottom: 2px solid var(--neon-green);
  display: inline-block;
  padding-bottom: 10px;
  width: 100%;
}
/* DISEÑO QUIRÚRGICO DE LA NAVE */
.nave-container {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: rgba(2, 2, 4, 0.9) !important;
    backdrop-filter: blur(15px) !important;
    z-index: 99999 !important;
    display: none; 
    align-items: center;
    justify-content: center;
    overflow-y: auto; /* PERMITE SCROLL SI ALGO QUEDA ABAJO */
    padding: 20px 0;
}

.login-card {
    background: var(--glass);
    border: 2px solid var(--cian);
    padding: 30px;
    border-radius: 20px;
    width: 95%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
    position: relative;
    margin: auto;
    max-height: 90vh;
    overflow-y: auto;
    /* LÍNEAS DE CORRECCIÓN QUIRÚRGICA: */
    display: flex;
    flex-direction: column; /* Apila todo verticalmente */
    align-items: center;    /* Centra inputs y botones */
}

.nave-logo { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--neon-green)); }
.nave-title { font-family: var(--font-brand); font-size: 1.2rem; color: var(--amber); margin-bottom: 30px; letter-spacing: 2px; }

.input-group {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.input-group input {
    background: transparent;
    border: none;
    color: white;
    width: 100%;
    outline: none;
}

.btn-nave-main {
    width: 100%;
    padding: 14px;
    background: var(--neon-green);
    color: black;
    border: none;
    border-radius: 10px;
    font-family: var(--font-brand);
    font-weight: bold;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.btn-nave-main:hover { transform: scale(1.02); background: white; }

/* 1. Enlaces del Login/Registro (Se mantienen compactos) */
.nave-links { 
    margin-top: 20px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
}
.nave-links a { 
    color: var(--cian); 
    font-size: 0.75rem; 
    text-decoration: none; 
    opacity: 0.7; 
    transition: 0.3s;
}
.nave-links a:hover { opacity: 1; text-decoration: underline; }

/* 2. Botón VOLVER (Independiente y Ergonómico para el dedo) */
.back-link { 
    display: block;
    margin-top: 35px;       /* Distancia generosa del botón de arriba */
    padding: 12px;          /* Zona de toque ampliada para el celular */
    color: var(--cian); 
    font-size: 0.8rem; 
    text-decoration: none; 
    opacity: 0.7; 
    font-family: var(--font-brand);
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s;
}
.back-link:hover { 
    opacity: 1; 
    text-shadow: 0 0 8px var(--cian); 
}

/* 3. Textos informativos */
.nave-text { font-size: 0.8rem; color: #ccc; margin-bottom: 20px; }

.close-nave {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 45px;         /* Área de clic ampliada para pulgares */
  height: 45px;
  display: flex;       /* Centrado perfecto */
  align-items: center;
  justify-content: center;
  font-size: 32px;     /* 'X' más grande y clara */
  cursor: pointer;

      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">ANUNCIO EMERGENTE (URL Imagen opcional)</label>
      <input type="text" id="aj_anuncio_imagen" class="nave-input" placeholder="URL de la imagen (Drive, Imgur...)">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">COSTO DE ENVÍO ($)</label>
      <input type="number" id="aj_envio" class="nave-input" placeholder="Ej: 3500">

      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">TOKEN MERCADO PAGO</label>
      <input type="password" id="aj_mp_token" class="nave-input" placeholder="APP_USR-...">
    </div>

    <div class="metric-card" style="margin-bottom:0; border-color: #e1306c;">
      <h3 style="color: #e1306c; margin-bottom: 15px;"><i class="fas fa-hashtag"></i> COMUNICACIÓN</h3>
      
      <label style="font-size:0.7rem; color:#888;">WHATSAPP (Contacto Clientes)</label>
      <input type="text" id="aj_wa" class="nave-input" placeholder="569...">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">WHATSAPP (Alertas Admin)</label>
      <input type="text" id="aj_wa_admin" class="nave-input" placeholder="569...">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">LINK INSTAGRAM</label>
      <input type="text" id="aj_ig" class="nave-input" placeholder="https://instagram.com/...">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">LINK FACEBOOK</label>
      <input type="text" id="aj_fb" class="nave-input" placeholder="https://facebook.com/...">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">LINK YOUTUBE</label>
      <input type="text" id="aj_yt" class="nave-input" placeholder="https://youtube.com/...">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">LINK TIKTOK</label>
      <input type="text" id="aj_tk" class="nave-input" placeholder="https://tiktok.com/...">
    </div>

    <div class="metric-card" style="margin-bottom:0; border-color: #00ff88;">
      <h3 style="color: #00ff88; margin-bottom: 15px;"><i class="fas fa-university"></i> DATOS BANCARIOS</h3>
      
      <label style="font-size:0.7rem; color:#888;">NOMBRE DEL BANCO</label>
      <input type="text" id="aj_banco_nombre" class="nave-input" placeholder="Ej: Banco Estado">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">TIPO DE CUENTA</label>
      <input type="text" id="aj_banco_tipo" class="nave-input" placeholder="Ej: Cuenta RUT">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">RUT</label>
      <input type="text" id="aj_banco_rut" class="nave-input" placeholder="Ej: 11.111.111-1">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">NÚMERO DE CUENTA</label>
      <input type="text" id="aj_banco_numero" class="nave-input" placeholder="Ej: 11111111">
      
      <label style="font-size:0.7rem; color:#888; margin-top:10px; display:block;">CORREO ELECTRÓNICO</label>
      <input type="text" id="aj_banco_correo" class="nave-input" placeholder="transferencias@espacioweed.cl">
    </div>
  </div>

  <button class="btn-nave-main" style="width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem;" onclick="guardarAjustesPanel(this)">
    <i class="fas fa-save"></i> GUARDAR CONFIGURACIÓN MAESTRA
  </button>
</div>

  </div> <div id="modal-venta-manual" class="modal" style="display:none; align-items:center; justify-content:center;">
    <div class="modal-content" style="max-width:450px; padding:20px !important;">
      <h2 class="cian">REGISTRAR VENTA FÍSICA</h2>
      <select id="manual-prod-select" class="nave-input"><option value="">Cargando...</option></select>
      <input type="number" id="manual-cantidad" class="nave-input" value="1" min="1">
      <div id="manual-total-preview" class="cian">$0</div>
      <button class="btn-nave-main" onclick="procesarVentaManual()">CONFIRMAR VENTA</button>
      <button class="btn-save" onclick="cerrarVentaManual()" style="background:transparent; border:1px solid #444; color:#888; margin-top:10px; width:100%;">
      CANCELAR
      </button>
    </div>
  </div>

  <div id="modal-promo" class="modal" style="display:none;">
  <div class="modal-content" style="max-width:400px; padding:20px !important; border: 1px solid var(--amber);">
    <h3 class="amber" style="font-family:'Orbitron'; margin-top:0;">CREAR PROMOCIÓN</h3>
    <p id="p-promo-name" style="font-size:0.9rem; color:#ccc; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:5px;"></p>
    
    <label style="font-size:0.7rem; color:var(--cian); display:block; margin-bottom:5px;">TIPO DE ACCIÓN:</label>
    <select id="tipo-promo-select" class="nave-input">
      <option value="Ninguna">SIN PROMO / NORMAL</option>
      <option value="Descuento">DESCUENTO DIRECTO ($)</option>
      <option value="Regalo">REGALO POR COMPRA (SKU)</option>
    </select>
    
    <label style="font-size:0.7rem; color:var(--cian); display:block; margin-top:15px; margin-bottom:5px;">VALOR O SKU DE REGALO:</label>
    <input type="text" id="detalle-promo-input" class="nave-input" placeholder="Ej: 5000 o EW-E-006">
    
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn-save" onclick="aplicarPromo()" style="flex:1;">APLICAR PROMO</button>
      <button onclick="cerrarPromo()" style="background:transparent; color:white; border:1px solid #444; padding:5px 10px; border-radius:5px; cursor:pointer;">CERRAR</button>
    </div>
  </div>
</div>

</body>
</html>
    <script>
let globalStock = [];
let promoSkuActive = "";
let miGrafico = null;

// INICIO DE LA NAVE
window.onload = function() {
  google.script.run.withSuccessHandler(inicializarAdmin).getAdminDashboardData();
  
  // Sensores de cálculo automático (Venta Manual)
  const sel = document.getElementById('manual-prod-select');
  const can = document.getElementById('manual-cantidad');
  if(sel) sel.addEventListener('change', actualizarPreviewManual);
  if(can) can.addEventListener('input', actualizarPreviewManual);
};

function inicializarAdmin(res) {
  globalStock = res.productos;
  document.getElementById('ventas-hoy').innerText = "$" + (res.hoy || 0).toLocaleString();
  document.getElementById('ventas-mes').innerText = "$" + (res.mes || 0).toLocaleString();
  renderStock(globalStock);
  
  // FORZAR EL SELECTOR AL MES ACTUAL (0)
  const selector = document.getElementById('periodo-selector');
  if(selector) {
    selector.value = "0";
    actualizarGrafico(); // Esto dispara la carga de los 30 días
  }
}

// --- SECCIÓN INVENTARIO ---
function renderStock(lista) {
  const tbody = document.getElementById('tbody-stock');
  if(!tbody) return;
  tbody.innerHTML = lista.map(p => `
    <tr>
      <td><strong class="cian">${p.NOMBRE}</strong><br><small>${p.SKU}</small></td>
      <td><input type="number" class="input-admin" value="${p.PRECIO}" id="pr-${p.SKU}"></td>
      <td><input type="number" class="input-admin" value="${p.STOCK}" id="st-${p.SKU}"></td>
      <td>
        <button class="btn-save" onclick="saveQuick('${p.SKU}')">GUARDAR</button>
        <button class="btn-promo" onclick="openPromo('${p.SKU}', '${p.NOMBRE}')" style="margin-top:5px; display:block; width:100%;">PROMO</button>
      </td>
    </tr>
  `).join('');
}

function filtrarStock() {
  const texto = document.getElementById('search-stock').value.toLowerCase();
  const filtrados = globalStock.filter(p => 
    p.NOMBRE.toLowerCase().includes(texto) || p.SKU.toLowerCase().includes(texto)
  );
  renderStock(filtrados);
}

function saveQuick(sku) {
  const precio = document.getElementById('pr-' + sku).value;
  const stock = document.getElementById('st-' + sku).value;
  google.script.run.withSuccessHandler(() => {
    alert("SISTEMA: Producto " + sku + " actualizado.");
    const idx = globalStock.findIndex(it => it.SKU === sku);
    if(idx !== -1) { globalStock[idx].PRECIO = precio; globalStock[idx].STOCK = stock; }
  }).actualizarProductoAdmin(sku, precio, stock);
}

// --- SECCIÓN PROMOCIONES ---
function openPromo(sku, nombre) {
  promoSkuActive = sku;
  document.getElementById('p-promo-name').innerText = nombre;
  document.getElementById('modal-promo').style.display = 'flex';
}

function aplicarPromo() {
  const tipo = document.getElementById('tipo-promo-select').value;
  const detalle = document.getElementById('detalle-promo-input').value;
  google.script.run.withSuccessHandler(() => {
    alert("SISTEMA: Promoción aplicada.");
    cerrarPromo();
  }).guardarPromoAdmin(promoSkuActive, tipo, detalle);
}

function cerrarPromo() { document.getElementById('modal-promo').style.display = 'none'; }

// --- SECCIÓN VENTA MANUAL ---
function abrirVentaManual() {
  const select = document.getElementById('manual-prod-select');
  if(!select || globalStock.length === 0) return alert("Cargando suministros, reintenta...");
  
  select.innerHTML = '<option value="">Selecciona producto...</option>' + 
    globalStock.map(p => `<option value="${p.SKU}" data-precio="${p.PRECIO}">${p.NOMBRE}</option>`).join('');
  document.getElementById('modal-venta-manual').style.display = 'flex';
}

function cerrarVentaManual() { document.getElementById('modal-venta-manual').style.display = 'none'; }

function actualizarPreviewManual() {
  const select = document.getElementById('manual-prod-select');
  const cant = document.getElementById('manual-cantidad').value;
  const precio = select.options[select.selectedIndex].getAttribute('data-precio') || 0;
  document.getElementById('manual-total-preview').innerText = "$" + (precio * cant).toLocaleString();
}

function procesarVentaManual() {
  const sku = document.getElementById('manual-prod-select').value;
  const cant = document.getElementById('manual-cantidad').value;
  if(!sku) return alert("Selecciona un producto.");
  
  google.script.run.withSuccessHandler(() => {
    alert("VENTA EXITOSA");
    cerrarVentaManual();
    google.script.run.withSuccessHandler(inicializarAdmin).getAdminDashboardData();
  }).registrarVentaManualServidor(sku, cant);
}

// --- SECCIÓN GRÁFICO (RADAR) ---
function actualizarGrafico() {
  const meses = document.getElementById('periodo-selector').value;
  google.script.run.withSuccessHandler(renderizarGrafico).getHistoricalData(meses);
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');

  if (id === 'buzon') cargarBuzon();
  if (id === 'config') cargarAjustesPanel(); // <--- ESTO ES LO NUEVO
}

function renderizarGrafico(listaData) {
  const ctx = document.getElementById('ventasChart').getContext('2d');
  const etiquetas = listaData.map(item => item.label);
  const datosFisicos = listaData.map(item => item.fisico);
  const datosOnline = listaData.map(item => item.online);

  if (miGrafico) miGrafico.destroy();

  miGrafico = new Chart(ctx, {
    type: 'line',
    data: {
      labels: etiquetas,
      datasets: [
        { 
          label: 'FÍSICO', 
          data: datosFisicos, 
          borderColor: '#ffaa00', 
          backgroundColor: 'rgba(255, 170, 0, 0.1)', 
          fill: true, 
          tension: 0.3,
          pointRadius: etiquetas.length > 20 ? 2 : 5, // Puntos pequeños si hay muchos datos
          pointBackgroundColor: '#ffaa00',
          pointHoverRadius: 8,
          borderWidth: 2
        },
        { 
          label: 'ONLINE', 
          data: datosOnline, 
          borderColor: '#00ffff', 
          backgroundColor: 'rgba(0, 255, 255, 0.1)', 
          fill: true, 
          tension: 0.3,
          pointRadius: etiquetas.length > 20 ? 2 : 5,
          pointBackgroundColor: '#00ffff',
          pointHoverRadius: 8,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false }, // Mejora el toque en móvil
      plugins: { 
        legend: { labels: { color: '#888', font: { family: 'Rajdhani', size: 11 } } },
        tooltip: {
          backgroundColor: 'rgba(10, 15, 26, 0.9)',
          titleFont: { family: 'Orbitron' },
          bodyFont: { family: 'Rajdhani' },
          callbacks: {
            label: function(context) {
              return context.dataset.label + ': $' + context.parsed.y.toLocaleString();
            }
          }
        }
      },
      scales: {
        y: { 
          beginAtZero: true, 
          grid: { color: '#1a1a1a' }, 
          ticks: { 
            color: '#666',
            font: { size: 10 },
            callback: value => '$' + value.toLocaleString()
          } 
        },
        x: { 
          grid: { display: false }, 
          ticks: { 
            color: '#666',
            font: { size: 10 },
            autoSkip: true,      // CRÍTICO: Salta etiquetas si no caben
            maxTicksLimit: 12,   // Máximo de etiquetas visibles para evitar caos
            maxRotation: 0       // Mantiene las etiquetas horizontales
          } 
        }
      }
    }
  });
}

let currentChatEmail = "";
let dataBuzonGlobal = [];

// CARGA INICIAL Y REFRESCO CADA 60 SEG
setInterval(() => {
  if (document.getElementById('buzon').classList.contains('active')) {
    google.script.run.withSuccessHandler(renderizarListaUsuarios).obtenerResumenBuzon();
  }
}, 60000);

// Esta función debe llamarse al hacer clic en la pestaña BUZON
function cargarBuzon() {
  google.script.run.withSuccessHandler(renderizarListaUsuarios).obtenerResumenBuzon();
}

function renderizarListaUsuarios(usuarios) {
  dataBuzonGlobal = usuarios || [];
  const lista = document.getElementById('lista-usuarios-buzon');
  if (!lista) return;
  
  if (dataBuzonGlobal.length === 0) {
    lista.innerHTML = '<p style="padding:20px; color:#444; font-size:0.8rem;">Sin mensajes en el buzón.</p>';
    return;
  }
  
  lista.innerHTML = dataBuzonGlobal.map(u => `
    <div class="user-card ${currentChatEmail === u.email ? 'active' : ''}" onclick="abrirChat('${u.email}')">
      <span class="email">${u.email} ${u.noLeidos > 0 ? `<span class="badge-new">${u.noLeidos}</span>` : ''}</span>
      <span class="preview">${u.ultimoMsj}</span>
    </div>
  `).join('');
}

function abrirChat(email) {
  currentChatEmail = email;
  document.getElementById('chat-header').innerText = "CONVERSACIÓN: " + email;
  document.getElementById('chat-input-area').style.display = 'flex';
  document.getElementById('chat-mensajes').innerHTML = '<p style="color:#333; text-align:center;">Abriendo canal...</p>';
  
  renderizarListaUsuarios(dataBuzonGlobal);
  
  // Aquí SÍ se usa 'google' (porque estamos en el navegador)
  google.script.run.withSuccessHandler(renderizarChat).obtenerChatUsuario(email);
}

function renderizarChat(mensajes) {
  const contenedor = document.getElementById('chat-mensajes');
  
  // Si el servidor envía nulo o vacío
  if (!mensajes || mensajes.length === 0) {
    contenedor.innerHTML = '<p style="text-align:center; color:#666; margin-top:20px;">Sin historial de mensajes.</p>';
    return;
  }

  // Dibujamos las burbujas directamente (sin cálculos de fechas complejos)
  contenedor.innerHTML = mensajes.map(m => {
    const claseBurbuja = m.soyYo ? 'admin' : 'user';
    return `
      <div class="bubble ${claseBurbuja}">
        ${m.mensaje}
      </div>
    `;
  }).join('');
  
  // Scroll hacia abajo
  contenedor.scrollTop = contenedor.scrollHeight;
}

function enviarMensajeBuzon() {
  const input = document.getElementById('msj-admin-input');
  const msj = input.value.trim();
  if (!msj || !currentChatEmail) return;

  input.value = "Enviando...";
  google.script.run.withSuccessHandler(() => {
    input.value = "";
    google.script.run.withSuccessHandler(renderizarChat).obtenerChatUsuario(currentChatEmail);
  }).enviarRespuestaAdmin(currentChatEmail, msj);
}

// ESTA ES LA FUNCIÓN QUE TE FALTABA
function filtrarBuzon() {
  const input = document.getElementById('search-buzon');
  if (!input) return;
  const texto = input.value.toLowerCase();
  const filtrados = dataBuzonGlobal.filter(u => u.email.toLowerCase().includes(texto));
  renderizarListaUsuarios(filtrados);
}

function mostrarNotificacion(msj) {
  const t = document.createElement('div');
  t.className = 'toast-weed';
  t.innerText = msj;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000); // Se borra solo en 3 segundos
}

// --- FUNCIONES DEL PANEL DE AJUSTES ---
function cargarAjustesPanel() {
  google.script.run.withSuccessHandler(ajustes => {
    document.getElementById('aj_estado').value = ajustes['ESTADO_TIENDA'] || 'ABIERTO';
    document.getElementById('aj_anuncio_texto').value = ajustes['ANUNCIO_TEXTO'] || '';
    document.getElementById('aj_anuncio_imagen').value = ajustes['ANUNCIO_IMAGEN'] || '';
    document.getElementById('aj_envio').value = ajustes['COSTO_ENVIO'] || '';
    document.getElementById('aj_mp_token').value = ajustes['MP_TOKEN'] || '';
    
    document.getElementById('aj_wa').value = ajustes['WHATSAPP'] || '';
    document.getElementById('aj_wa_admin').value = ajustes['WHATSAPP_ADMIN'] || '';
    document.getElementById('aj_ig').value = ajustes['LINK_INSTAGRAM'] || '';
    document.getElementById('aj_fb').value = ajustes['LINK_FACEBOOK'] || '';
    document.getElementById('aj_yt').value = ajustes['LINK_YOUTUBE'] || '';
    document.getElementById('aj_tk').value = ajustes['LINK_TIKTOK'] || '';
    
    document.getElementById('aj_banco_nombre').value = ajustes['BANCO_NOMBRE'] || '';
    document.getElementById('aj_banco_tipo').value = ajustes['BANCO_TIPO'] || '';
    document.getElementById('aj_banco_rut').value = ajustes['BANCO_RUT'] || '';
    document.getElementById('aj_banco_numero').value = ajustes['BANCO_NUMERO'] || '';
    document.getElementById('aj_banco_correo').value = ajustes['BANCO_CORREO'] || '';
  }).getConfig(); // Usamos getConfig para aprovechar la función ya creada
}

function guardarAjustesPanel(btn) {
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';
  btn.disabled = true;

  const nuevos = {
    'ESTADO_TIENDA': document.getElementById('aj_estado').value,
    'ANUNCIO_TEXTO': document.getElementById('aj_anuncio_texto').value,
    'ANUNCIO_IMAGEN': document.getElementById('aj_anuncio_imagen').value,
    'COSTO_ENVIO': document.getElementById('aj_envio').value,
    'MP_TOKEN': document.getElementById('aj_mp_token').value,
    
    'WHATSAPP': document.getElementById('aj_wa').value,
    'WHATSAPP_ADMIN': document.getElementById('aj_wa_admin').value,
    'LINK_INSTAGRAM': document.getElementById('aj_ig').value,
    'LINK_FACEBOOK': document.getElementById('aj_fb').value,
    'LINK_YOUTUBE': document.getElementById('aj_yt').value,
    'LINK_TIKTOK': document.getElementById('aj_tk').value,
    
    'BANCO_NOMBRE': document.getElementById('aj_banco_nombre').value,
    'BANCO_TIPO': document.getElementById('aj_banco_tipo').value,
    'BANCO_RUT': document.getElementById('aj_banco_rut').value,
    'BANCO_NUMERO': document.getElementById('aj_banco_numero').value,
    'BANCO_CORREO': document.getElementById('aj_banco_correo').value
  };

  google.script.run.withSuccessHandler(res => {
    btn.innerHTML = '<i class="fas fa-check"></i> GUARDADO EXITOSO';
    setTimeout(() => {
      btn.innerHTML = '<i class="fas fa-save"></i> GUARDAR CONFIGURACIÓN MAESTRA';
      btn.disabled = false;
    }, 2000);
  }).guardarAjustes(nuevos);
}
</script>

</body>
</html>
