<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Ecosistema Coach 3D LATAM</title>
    <style>
        :root {
            --primary-bg: #0a0f1e;
            --glass: rgba(15, 25, 45, 0.85);
            --neon-m: #a855f7; /* Morado */
            --neon-n: #22d3ee; /* Cian */
            --neon-f: #10b981; /* Verde */
            --white: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: var(--white);
        }

        /* Lienzo con las dimensiones oficiales requeridas por LinkedIn */
        .linkedin-banner {
            width: 1584px;
            height: 396px;
            background-color: var(--primary-bg);
            background-image: linear-gradient(135deg, rgba(10,15,30,0.96) 0%, rgba(15,20,40,0.92) 100%), 
                              url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1584&q=80');
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(34, 211, 238, 0.15);
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Malla digital Matrix */
        .linkedin-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(34,211,238,0.025) 1px, transparent 1px),
                        linear-gradient(rgba(168,85,247,0.025) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 1;
        }

        /* Espacio libre y reservado a la izquierda para tu silueta real */
        .personal-placement-zone {
            width: 440px;
            height: 100%;
            position: relative;
            z-index: 2;
        }

        /* Bloque central de textos y propuesta de valor */
        .text-container-zone {
            flex: 1;
            padding-left: 10px;
            padding-right: 40px;
            z-index: 2;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .slogan-block {
            max-width: 680px;
        }

        .slogan-block h1 {
            font-size: 2.15rem;
            font-weight: 700;
            line-height: 1.35;
            color: #ffffff;
        }

        .slogan-block h1 .highlight-cyan {
            color: var(--neon-n);
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }

        .slogan-block h1 .highlight-purple {
            color: var(--neon-m);
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Módulo lateral derecho de Pilares y Enlaces */
        .navigation-block {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 320px;
        }

        .pill-card {
            background: var(--glass);
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .pill-card.tech { border-left: 4px solid var(--neon-n); color: var(--neon-n); }
        .pill-card.fin { border-left: 4px solid var(--neon-m); color: var(--neon-m); }
        .pill-card.ment { border-left: 4px solid var(--neon-f); color: var(--neon-f); }

        /* Tarjeta de llamado a la acción (CTA) */
        .cta-action-card {
            background: rgba(168, 85, 247, 0.12);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 6px;
            padding: 12px 16px;
            text-align: center;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .cta-action-card p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbd5e1;
            margin-bottom: 4px;
        }

        .cta-action-card .url-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="linkedin-banner">
        
        <div class="personal-placement-zone"></div>
        
        <div class="text-container-zone">
            
            <div class="slogan-block">
                <h1>
                    Optimizando tu <span class="highlight-cyan">Negocio</span>, tu Salud y tus Finanzas a través de la <span class="highlight-cyan">TECNOLOGÍA</span> y la <span class="highlight-purple">MENTALIDAD</span>.
                </h1>
            </div>
            
            <div class="navigation-block">
                <div class="pill-card tech">E-Commerce & IA</div>
                <div class="pill-card fin">Ecosistemas 3D</div>
                <div class="pill-card ment">Consultoría Estratégica</div>
                
                <div class="cta-action-card">
                    <p>Visita nuestra plataforma ➔</p>
                    <div class="url-text">coach3dlatam.app/servicios</div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
