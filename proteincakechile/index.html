<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Banner LinkedIn Diego Arenas</title>
    <style>
        :root {
            --primary-bg: #0a0f1e;
            --neon-m: #a855f7; /* Morado */
            --neon-n: #22d3ee; /* Cian */
            --neon-f: #10b981; /* Verde */
            --white: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        /* Contenedor con las dimensiones oficiales exigidas por LinkedIn */
        .linkedin-banner {
            width: 1584px;
            height: 396px;
            background-color: var(--primary-bg);
            background-image: linear-gradient(135deg, rgba(10,15,30,0.95) 0%, rgba(20,10,40,0.9) 100%), 
                              url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1584&q=80');
            background-size: cover;
            background-position: center;
            border: 2px solid var(--neon-n);
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
        }
        /* Cuadrícula digital Matrix de fondo */
        .linkedin-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px),
                        linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Zona de resguardo para la foto de perfil redonda de LinkedIn */
        .profile-safe-zone {
            width: 420px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        /* Bloque central del mensaje de impacto */
        .content-zone {
            flex: 1;
            padding-right: 50px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .main-slogan {
            color: var(--white);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .main-slogan span {
            color: var(--neon-n);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
        /* Módulos de los pilares */
        .pillars-container {
            display: flex;
            gap: 25px;
        }
        .pillar-tag {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 4px;
            background: rgba(15, 25, 45, 0.7);
        }
        .p-tech { border: 1px solid var(--neon-n); color: var(--neon-n); }
        .p-fin { border: 1px solid var(--neon-m); color: var(--neon-m); }
        .p-ment { border: 1px solid var(--neon-f); color: var(--neon-f); }
        /* URL del Call To Action en la esquina inferior derecha */
        .cta-url {
            position: absolute;
            bottom: 25px;
            right: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            background: rgba(168, 85, 247, 0.2);
            padding: 8px 18px;
            border-radius: 5px;
            border: 1px solid var(--neon-m);
            letter-spacing: 0.5px;
            z-index: 2;
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body>

    <div class="linkedin-banner">
        
        <div class="profile-safe-zone"></div>
        
        <div class="content-zone">
            <h1 class="main-slogan">
                Optimizando tu Negocio, tu Salud y tus Finanzas a través de la <span>Tecnología</span> y la <span>Mentalidad</span>.
            </h1>
            <div class="pillars-container">
                <div class="pillar-tag p-tech">E-Commerce & IA</div>
                <div class="pillar-tag p-fin">Ecosistemas 3D</div>
                <div class="pillar-tag p-ment">Consultoría Estratégica</div>
            </div>
        </div>
        
        <div class="cta-url">
            Visita nuestra plataforma ➔ coach3dlatam.app/servicios
        </div>
    </div>

</body>
</html>
