<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coach3D CRM</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:white;
    padding:20px;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
}

#kanban{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding:20px;
}

.columna{
    min-width:300px;
    border-radius:10px;
    padding:10px;
    color:white;
}

.tarjeta{
    background:white;
    color:black;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:6px 10px;
    cursor:pointer;
}
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center; align-items: center;
}
.modal-content {
    background: white; padding: 20px; border-radius: 8px;
    width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
}
.close-btn {
    float: right; cursor: pointer; font-weight: bold; font-size: 1.2em;
}
</style>

</head>

<body>

<header>

<h1>Coach3D CRM</h1>

<p>Total Prospectos:
<span id="total">0</span>
</p>

<div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button onclick="modalNuevoProspecto()" style="background:#2ecc71; color:white; border:none; border-radius:5px;">+ Nuevo Prospecto</button>
    <button onclick="modalNuevaColumna()" style="background:#3498db; color:white; border:none; border-radius:5px;">+ Nueva Columna</button>
    <button onclick="modalCorreoMasivo()" style="background:#e67e22; color:white; border:none; border-radius:5px;">Correo Masivo</button>
</div>

</header>

<div id="kanban"></div>
<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">X</span>
        <h2>Editar Prospecto</h2>
        <input type="hidden" id="edit_id">
        
        <label style="font-size:12px; font-weight:bold;">Negocio:</label>
        <input type="text" id="edit_negocio" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Contacto:</label>
        <input type="text" id="edit_contacto" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Rubro:</label>
        <input type="text" id="edit_rubro" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Dirección:</label>
        <input type="text" id="edit_direccion" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Correo:</label>
        <input type="text" id="edit_correo" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Prioridad (Alta, Media, Baja):</label>
        <input type="text" id="edit_prioridad" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Etiquetas (separadas por coma):</label>
        <input type="text" id="edit_etiquetas" style="width:90%; padding:8px; margin-bottom:8px;">
        
        <label style="font-size:12px; font-weight:bold;">Observaciones:</label>
        <textarea id="edit_observaciones" style="width:90%; padding:8px; margin-bottom:15px; height:60px;"></textarea>
        
        <button onclick="guardarCambiosDetalle()" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; cursor:pointer; border-radius:5px;">Guardar Cambios</button>
    </div>
</div>

    <div id="modalNuevoProspecto" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalNuevoProspecto').style.display='none'">X</span>
        <h2>Nuevo Prospecto</h2>
        <input type="text" id="np_negocio" placeholder="Nombre del Negocio" style="width:90%; padding:8px; margin-bottom:10px;">
        <input type="text" id="np_contacto" placeholder="Persona de Contacto" style="width:90%; padding:8px; margin-bottom:10px;">
        <input type="text" id="np_whatsapp" placeholder="WhatsApp (Ej: 56912345678)" style="width:90%; padding:8px; margin-bottom:15px;">
        <button onclick="guardarProspecto()" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Guardar Prospecto</button>
    </div>
</div>

<div id="modalMover" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalMover').style.display='none'">X</span>
        <h2>Mover a columna:</h2>
        <input type="hidden" id="mover_id">
        <select id="mover_destino" style="width:100%; padding:8px; margin-bottom:15px;"></select>
        <button onclick="confirmarMovimiento()" style="background:#f39c12; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Confirmar Movimiento</button>
    </div>
</div>

<!-- Modal Correo Individual -->
<div id="modalCorreoIndividual" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalCorreoIndividual').style.display='none'">X</span>
        <h2>Enviar Correo</h2>
        <input type="hidden" id="ci_id">
        <p><strong>Para:</strong> <span id="ci_correo_txt"></span></p>
        <input type="hidden" id="ci_correo">
        <input type="text" id="ci_asunto" placeholder="Asunto" style="width:90%; padding:8px; margin-bottom:10px;">
        <textarea id="ci_mensaje" placeholder="Aplica aquí tu texto persuasivo..." style="width:90%; padding:8px; margin-bottom:15px; height:100px;"></textarea>
        <button onclick="enviarCorreoIndividual()" style="background:#7f8c8d; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Añadir a Cola de Envío</button>
    </div>
</div>

<!-- Modal Correo Masivo -->
<div id="modalCorreoMasivo" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalCorreoMasivo').style.display='none'">X</span>
        <h2>Correo Masivo</h2>
        <p>Se enviará un correo individual a todos los prospectos con email registrado.</p>
        <input type="text" id="cm_asunto" placeholder="Asunto" style="width:90%; padding:8px; margin-bottom:10px;">
        <textarea id="cm_mensaje" placeholder="Mensaje base para todos..." style="width:90%; padding:8px; margin-bottom:15px; height:100px;"></textarea>
        <button onclick="enviarCorreoMasivo()" style="background:#e67e22; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Añadir Masivo a Cola</button>
    </div>
</div>

<div id="modalNuevaColumna" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalNuevaColumna').style.display='none'">X</span>
        <h2>Nueva Columna</h2>
        <input type="text" id="nc_nombre" placeholder="Ej: En Negociación" style="width:90%; padding:8px; margin-bottom:10px;">
        <br>
        <label for="nc_color" style="font-weight:bold;">Color de la columna:</label>
        <input type="color" id="nc_color" value="#3498db" style="margin-bottom:15px; cursor:pointer;">
        <button onclick="guardarColumna()" style="background:#3498db; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Guardar Columna</button>
    </div>
</div>
    
<script>

const API =
"https://script.google.com/macros/s/AKfycbybJoF5-oeyWPNp3sheDya3hfV8ndG4I7BySRZj9GRPVUvVTc4RMGXOtXB0TR2fOcqI_g/exec";    

let columnas = [];
let prospectos = [];

async function iniciar(){

    try{

        columnas =
            await fetch(
                API + "?action=getColumnas"
            )
            .then(r=>r.json());

        prospectos =
            await fetch(
                API + "?action=getProspectos"
            )
            .then(r=>r.json());

        document.getElementById(
            "total"
        ).innerText =
            prospectos.length;

        renderizar();

    }catch(error){

        console.log(error);

        alert(
            "Error conectando con Apps Script"
        );

    }

}

function renderizar(){

    const kanban =
        document.getElementById(
            "kanban"
        );

    kanban.innerHTML = "";

    columnas
    .sort((a,b)=>a.orden-b.orden)
    .forEach(col=>{

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "columna";

        div.style.background =
            col.color;

        div.innerHTML =
            `<h2>${col.nombre}</h2>`;

        prospectos
        .filter(
            p => String(p.estadoId) === String(col.id) && p.activo !== false
        )
        .forEach(p=>{

            const card =
                document.createElement(
                    "div"
                );

            card.className =
                "tarjeta";

            card.innerHTML =
            `
            <div onclick="abrirModal('${p.id}')" style="cursor:pointer;" title="Clic para ver detalles y editar">
                <strong>${p.negocio}</strong>
                <br>
                ${p.contacto || ""}
            </div>
            <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                <button onclick="wa('${p.whatsapp}', '${p.contacto}')" style="background:#25D366; color:white; border:none; border-radius:4px;">WhatsApp</button>
                <button onclick="prepararCorreoIndividual('${p.id}', '${p.correo}')" style="background:#7f8c8d; color:white; border:none; border-radius:4px;">Correo</button>
                <button onclick="moverProspecto('${p.id}')" style="background:#f39c12; color:white; border:none; border-radius:4px;">Mover</button>
            </div>
            `;

            div.appendChild(card);

        });

        kanban.appendChild(div);

    });

}

function wa(numero, contacto){

    // Si no hay contacto, usamos un término genérico amigable
    let nombre = (contacto && contacto !== "undefined" && contacto !== "") ? contacto : "emprendedor";
    
    // Plantilla de neuroventas basada en tu reporte
    let mensajeBase = `Hola ${nombre}. Vi tu negocio y creo que puedo ayudarte a conseguir más clientes. ¿Te puedo contar?`;
    
    // Mostramos un modal nativo para permitir edición antes de enviar
    let mensajeFinal = prompt("Edita el mensaje antes de enviarlo por WhatsApp:", mensajeBase);
    
    // Si el usuario no cancela el modal, abrimos WhatsApp con el texto codificado
    if(mensajeFinal !== null){
        window.open(
            "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensajeFinal)
        );
    }

}

iniciar();
    
function abrirModal(id) {
    const p = prospectos.find(x => String(x.id) === String(id));
    if(!p) return;
    
    document.getElementById("edit_id").value = p.id;
    document.getElementById("edit_negocio").value = p.negocio || "";
    document.getElementById("edit_contacto").value = p.contacto || "";
    document.getElementById("edit_rubro").value = p.rubro || "";
    document.getElementById("edit_direccion").value = p.direccion || "";
    document.getElementById("edit_correo").value = p.correo || "";
    document.getElementById("edit_prioridad").value = p.prioridad || "";
    document.getElementById("edit_etiquetas").value = p.etiquetas || "";
    document.getElementById("edit_observaciones").value = p.observaciones || "";
    
    document.getElementById("modalDetalle").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modalDetalle").style.display = "none";
}

// --- FUNCIONES NUEVO PROSPECTO ---
function modalNuevoProspecto() {
    document.getElementById('np_negocio').value = "";
    document.getElementById('np_contacto').value = "";
    document.getElementById('np_whatsapp').value = "";
    document.getElementById('modalNuevoProspecto').style.display = 'flex';
}

function guardarProspecto() {
    const negocio = document.getElementById('np_negocio').value;
    const contacto = document.getElementById('np_contacto').value;
    const whatsapp = document.getElementById('np_whatsapp').value;
    
    if(!negocio) {
        alert("El nombre del negocio es obligatorio.");
        return;
    }
    
    // Ocultamos el modal mientras procesa
    document.getElementById('modalNuevoProspecto').style.display = 'none';
    
    // Enviamos los datos a Apps Script
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "createProspecto",
            negocio: negocio,
            contacto: contacto,
            whatsapp: whatsapp
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Recargamos el tablero automáticamente
        } else {
            alert("Error al guardar el prospecto.");
        }
    })
    .catch(error => console.log("Error:", error));
}

// --- FUNCIONES MOVER PROSPECTO ---
function moverProspecto(id) {
    document.getElementById('mover_id').value = id;
    const select = document.getElementById('mover_destino');
    select.innerHTML = ''; // Limpiamos opciones anteriores
    
    // Llenamos el select con las columnas dinámicas de tu BD
    columnas.sort((a,b) => a.orden - b.orden).forEach(col => {
        select.innerHTML += `<option value="${col.id}">${col.nombre}</option>`;
    });
    
    document.getElementById('modalMover').style.display = 'flex';
}

function confirmarMovimiento() {
    const id = document.getElementById('mover_id').value;
    const destinoId = document.getElementById('mover_destino').value;
    
    // Ocultamos el modal
    document.getElementById('modalMover').style.display = 'none';

    // Enviamos la instrucción de cambio de columna a Apps Script
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "updateEstado",
            id: id,
            estadoId: destinoId
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Repintamos el tablero para que la tarjeta salte a su nueva columna
        } else {
            alert("Error al mover el prospecto.");
        }
    })
    .catch(error => console.log("Error:", error));
}

 // --- FUNCIONES CORREO INDIVIDUAL ---
function prepararCorreoIndividual(id, correo) {
    if(!correo || correo === "undefined" || correo.trim() === "") {
        alert("Este prospecto no tiene un correo registrado válido.");
        return;
    }
    document.getElementById('ci_id').value = id;
    document.getElementById('ci_correo').value = correo;
    document.getElementById('ci_correo_txt').innerText = correo;
    document.getElementById('ci_asunto').value = "";
    document.getElementById('ci_mensaje').value = "";
    document.getElementById('modalCorreoIndividual').style.display = 'flex';
}

function enviarCorreoIndividual() {
    const id = document.getElementById('ci_id').value;
    const correo = document.getElementById('ci_correo').value;
    const asunto = document.getElementById('ci_asunto').value;
    const mensaje = document.getElementById('ci_mensaje').value;

    if(!asunto || !mensaje) {
        alert("El asunto y el mensaje son obligatorios.");
        return;
    }

    document.getElementById('modalCorreoIndividual').style.display = 'none';

    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "queueEmail",
            prospectoId: id,
            correo: correo,
            asunto: asunto,
            mensaje: mensaje
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success) alert("¡Correo encolado con éxito!");
        else alert("Hubo un error al encolar el correo.");
    })
    .catch(error => console.log("Error:", error));
}

// --- FUNCIONES CORREO MASIVO ---
function modalCorreoMasivo() {
    document.getElementById('cm_asunto').value = "";
    document.getElementById('cm_mensaje').value = "";
    document.getElementById('modalCorreoMasivo').style.display = 'flex';
}

function enviarCorreoMasivo() {
    const asunto = document.getElementById('cm_asunto').value;
    const mensaje = document.getElementById('cm_mensaje').value;

    if(!asunto || !mensaje) {
        alert("El asunto y el mensaje son obligatorios.");
        return;
    }

    // Filtramos inteligentemente a quién enviarle (solo activos y con email)
    const destinatarios = prospectos
        .filter(p => p.correo && p.correo !== "undefined" && p.correo.trim() !== "" && p.activo !== false)
        .map(p => ({ id: p.id, correo: p.correo }));

    if(destinatarios.length === 0) {
        alert("No hay prospectos con correo válido en el sistema.");
        return;
    }

    document.getElementById('modalCorreoMasivo').style.display = 'none';

    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "queueBulkEmail",
            asunto: asunto,
            mensaje: mensaje,
            destinatarios: destinatarios
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success) alert(`¡${destinatarios.length} correos añadidos a la cola de envío!`);
        else alert("Hubo un error al encolar el lote masivo.");
    })
    .catch(error => console.log("Error:", error));
}

// --- FUNCIONES NUEVA COLUMNA ---
function modalNuevaColumna() {
    document.getElementById('nc_nombre').value = "";
    document.getElementById('nc_color').value = "#3498db"; // Azul por defecto
    document.getElementById('modalNuevaColumna').style.display = 'flex';
}

function guardarColumna() {
    const nombre = document.getElementById('nc_nombre').value;
    const color = document.getElementById('nc_color').value;

    if(!nombre) {
        alert("El nombre de la columna es obligatorio.");
        return;
    }

    // Ocultamos el modal
    document.getElementById('modalNuevaColumna').style.display = 'none';

    // Calculamos el orden para ponerla al final
    const nuevoOrden = columnas.length > 0 ? Math.max(...columnas.map(c => c.orden)) + 1 : 1;

    // Enviamos al backend
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "createColumna",
            nombre: nombre,
            color: color,
            orden: nuevoOrden
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Recargamos para que aparezca la columna al instante
        } else {
            alert("Error al guardar la columna.");
        }
    })
    .catch(error => console.log("Error:", error));
}

// --- FUNCIÓN ACTUALIZAR PROSPECTO ---
function guardarCambiosDetalle() {
    // Ocultamos el modal
    document.getElementById('modalDetalle').style.display = 'none';

    // Enviamos el paquete de datos al backend
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "updateProspecto",
            id: document.getElementById("edit_id").value,
            negocio: document.getElementById("edit_negocio").value,
            contacto: document.getElementById("edit_contacto").value,
            rubro: document.getElementById("edit_rubro").value,
            direccion: document.getElementById("edit_direccion").value,
            correo: document.getElementById("edit_correo").value,
            prioridad: document.getElementById("edit_prioridad").value,
            etiquetas: document.getElementById("edit_etiquetas").value,
            observaciones: document.getElementById("edit_observaciones").value
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Recargamos para ver los cambios
        } else {
            alert("Error al actualizar el prospecto.");
        }
    })
    .catch(error => console.log("Error:", error));
}
    
</script>

</body>
</html>
