<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coach3D CRM</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:white;
    padding:20px;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
}

#kanban{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding:20px;
}

.columna{
    min-width:300px;
    border-radius:10px;
    padding:10px;
    color:white;
}

.tarjeta{
    background:white;
    color:black;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:6px 10px;
    cursor:pointer;
}
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center; align-items: center;
}
.modal-content {
    background: white; padding: 20px; border-radius: 8px;
    width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
}
.close-btn {
    float: right; cursor: pointer; font-weight: bold; font-size: 1.2em;
}
</style>

</head>

<body>

<header>

<h1>Coach3D CRM</h1>

<p>Total Prospectos:
<span id="total">0</span>
</p>

</header>

<div id="kanban"></div>
<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">X</span>
        <h2 id="modalNegocio">Cargando...</h2>
        <p><strong>Contacto:</strong> <span id="modalContacto"></span></p>
        <p><strong>Rubro:</strong> <span id="modalRubro"></span></p>
        <p><strong>Dirección:</strong> <span id="modalDireccion"></span></p>
        <p><strong>Correo:</strong> <span id="modalCorreo"></span></p>
        <p><strong>Prioridad:</strong> <span id="modalPrioridad"></span></p>
        <p><strong>Etiquetas:</strong> <span id="modalEtiquetas"></span></p>
        <p><strong>Observaciones:</strong> <span id="modalObservaciones"></span></p>
    </div>
</div>
<script>

const API =
"https://script.google.com/macros/s/AKfycbybJoF5-oeyWPNp3sheDya3hfV8ndG4I7BySRZj9GRPVUvVTc4RMGXOtXB0TR2fOcqI_g/exec";    

let columnas = [];
let prospectos = [];

async function iniciar(){

    try{

        columnas =
            await fetch(
                API + "?action=getColumnas"
            )
            .then(r=>r.json());

        prospectos =
            await fetch(
                API + "?action=getProspectos"
            )
            .then(r=>r.json());

        document.getElementById(
            "total"
        ).innerText =
            prospectos.length;

        renderizar();

    }catch(error){

        console.log(error);

        alert(
            "Error conectando con Apps Script"
        );

    }

}

function renderizar(){

    const kanban =
        document.getElementById(
            "kanban"
        );

    kanban.innerHTML = "";

    columnas
    .sort((a,b)=>a.orden-b.orden)
    .forEach(col=>{

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "columna";

        div.style.background =
            col.color;

        div.innerHTML =
            `<h2>${col.nombre}</h2>`;

        prospectos
        .filter(
            p => String(p.estadoId) === String(col.id) && p.activo !== false
        )
        .forEach(p=>{

            const card =
                document.createElement(
                    "div"
                );

            card.className =
                "tarjeta";

            card.innerHTML =
            `
            <div onclick="abrirModal('${p.id}')" style="cursor:pointer;" title="Ver detalles">
                <strong>${p.negocio}</strong>
                <br>
                ${p.contacto || ""}
            </div>
            <br>
            <button onclick="wa('${p.whatsapp}', '${p.contacto}')">
            WhatsApp
            </button>
            `;

            div.appendChild(card);

        });

        kanban.appendChild(div);

    });

}

function wa(numero, contacto){

    // Si no hay contacto, usamos un término genérico amigable
    let nombre = (contacto && contacto !== "undefined" && contacto !== "") ? contacto : "emprendedor";
    
    // Plantilla de neuroventas basada en tu reporte
    let mensajeBase = `Hola ${nombre}. Vi tu negocio y creo que puedo ayudarte a conseguir más clientes. ¿Te puedo contar?`;
    
    // Mostramos un modal nativo para permitir edición antes de enviar
    let mensajeFinal = prompt("Edita el mensaje antes de enviarlo por WhatsApp:", mensajeBase);
    
    // Si el usuario no cancela el modal, abrimos WhatsApp con el texto codificado
    if(mensajeFinal !== null){
        window.open(
            "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensajeFinal)
        );
    }

}

iniciar();
function abrirModal(id) {
    // Buscamos el prospecto exacto por su ID
    const p = prospectos.find(x => String(x.id) === String(id));
    if(!p) return;
    
    // Llenamos el modal con la información
    document.getElementById("modalNegocio").innerText = p.negocio || "Sin nombre";
    document.getElementById("modalContacto").innerText = p.contacto || "-";
    document.getElementById("modalRubro").innerText = p.rubro || "-";
    document.getElementById("modalDireccion").innerText = p.direccion || "-";
    document.getElementById("modalCorreo").innerText = p.correo || "-";
    document.getElementById("modalPrioridad").innerText = p.prioridad || "-";
    document.getElementById("modalEtiquetas").innerText = p.etiquetas || "-";
    document.getElementById("modalObservaciones").innerText = p.observaciones || "-";
    
    // Mostramos el modal
    document.getElementById("modalDetalle").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modalDetalle").style.display = "none";
}
</script>

</body>
</html>
