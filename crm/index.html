<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coach3D CRM</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:white;
    padding:20px;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
}

#kanban{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding:20px;
}

.columna{
    min-width:300px;
    border-radius:10px;
    padding:10px;
    color:white;
}

.tarjeta{
    background:white;
    color:black;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:6px 10px;
    cursor:pointer;
}
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center; align-items: center;
}
.modal-content {
    background: white; padding: 20px; border-radius: 8px;
    width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
}
.close-btn {
    float: right; cursor: pointer; font-weight: bold; font-size: 1.2em;
}
</style>

</head>

<body>

<header>

<h1>Coach3D CRM</h1>

<p>Total Prospectos:
<span id="total">0</span>
</p>

<div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button onclick="modalNuevoProspecto()" style="background:#2ecc71; color:white; border:none; border-radius:5px;">+ Nuevo Prospecto</button>
    <button onclick="modalNuevaColumna()" style="background:#3498db; color:white; border:none; border-radius:5px;">+ Nueva Columna</button>
    <button onclick="modalCorreoMasivo()" style="background:#e67e22; color:white; border:none; border-radius:5px;">Correo Masivo</button>
</div>

</header>

<div id="kanban"></div>
<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">X</span>
        <h2 id="modalNegocio">Cargando...</h2>
        <p><strong>Contacto:</strong> <span id="modalContacto"></span></p>
        <p><strong>Rubro:</strong> <span id="modalRubro"></span></p>
        <p><strong>Dirección:</strong> <span id="modalDireccion"></span></p>
        <p><strong>Correo:</strong> <span id="modalCorreo"></span></p>
        <p><strong>Prioridad:</strong> <span id="modalPrioridad"></span></p>
        <p><strong>Etiquetas:</strong> <span id="modalEtiquetas"></span></p>
        <p><strong>Observaciones:</strong> <span id="modalObservaciones"></span></p>
    </div>
</div>

    <div id="modalNuevoProspecto" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalNuevoProspecto').style.display='none'">X</span>
        <h2>Nuevo Prospecto</h2>
        <input type="text" id="np_negocio" placeholder="Nombre del Negocio" style="width:90%; padding:8px; margin-bottom:10px;">
        <input type="text" id="np_contacto" placeholder="Persona de Contacto" style="width:90%; padding:8px; margin-bottom:10px;">
        <input type="text" id="np_whatsapp" placeholder="WhatsApp (Ej: 56912345678)" style="width:90%; padding:8px; margin-bottom:15px;">
        <button onclick="guardarProspecto()" style="background:#2ecc71; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Guardar Prospecto</button>
    </div>
</div>

<div id="modalMover" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('modalMover').style.display='none'">X</span>
        <h2>Mover a columna:</h2>
        <input type="hidden" id="mover_id">
        <select id="mover_destino" style="width:100%; padding:8px; margin-bottom:15px;"></select>
        <button onclick="confirmarMovimiento()" style="background:#f39c12; color:white; border:none; padding:10px; width:100%; cursor:pointer;">Confirmar Movimiento</button>
    </div>
</div>
<script>

const API =
"https://script.google.com/macros/s/AKfycbybJoF5-oeyWPNp3sheDya3hfV8ndG4I7BySRZj9GRPVUvVTc4RMGXOtXB0TR2fOcqI_g/exec";    

let columnas = [];
let prospectos = [];

async function iniciar(){

    try{

        columnas =
            await fetch(
                API + "?action=getColumnas"
            )
            .then(r=>r.json());

        prospectos =
            await fetch(
                API + "?action=getProspectos"
            )
            .then(r=>r.json());

        document.getElementById(
            "total"
        ).innerText =
            prospectos.length;

        renderizar();

    }catch(error){

        console.log(error);

        alert(
            "Error conectando con Apps Script"
        );

    }

}

function renderizar(){

    const kanban =
        document.getElementById(
            "kanban"
        );

    kanban.innerHTML = "";

    columnas
    .sort((a,b)=>a.orden-b.orden)
    .forEach(col=>{

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "columna";

        div.style.background =
            col.color;

        div.innerHTML =
            `<h2>${col.nombre}</h2>`;

        prospectos
        .filter(
            p => String(p.estadoId) === String(col.id) && p.activo !== false
        )
        .forEach(p=>{

            const card =
                document.createElement(
                    "div"
                );

            card.className =
                "tarjeta";

            card.innerHTML =
            `
            <div onclick="abrirModal('${p.id}')" style="cursor:pointer;" title="Clic para ver detalles y editar">
                <strong>${p.negocio}</strong>
                <br>
                ${p.contacto || ""}
            </div>
            <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                <button onclick="wa('${p.whatsapp}', '${p.contacto}')" style="background:#25D366; color:white; border:none; border-radius:4px;">WhatsApp</button>
                <button onclick="prepararCorreoIndividual('${p.id}', '${p.correo}')" style="background:#7f8c8d; color:white; border:none; border-radius:4px;">Correo</button>
                <button onclick="moverProspecto('${p.id}')" style="background:#f39c12; color:white; border:none; border-radius:4px;">Mover</button>
            </div>
            `;

            div.appendChild(card);

        });

        kanban.appendChild(div);

    });

}

function wa(numero, contacto){

    // Si no hay contacto, usamos un término genérico amigable
    let nombre = (contacto && contacto !== "undefined" && contacto !== "") ? contacto : "emprendedor";
    
    // Plantilla de neuroventas basada en tu reporte
    let mensajeBase = `Hola ${nombre}. Vi tu negocio y creo que puedo ayudarte a conseguir más clientes. ¿Te puedo contar?`;
    
    // Mostramos un modal nativo para permitir edición antes de enviar
    let mensajeFinal = prompt("Edita el mensaje antes de enviarlo por WhatsApp:", mensajeBase);
    
    // Si el usuario no cancela el modal, abrimos WhatsApp con el texto codificado
    if(mensajeFinal !== null){
        window.open(
            "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensajeFinal)
        );
    }

}

iniciar();
function abrirModal(id) {
    // Buscamos el prospecto exacto por su ID
    const p = prospectos.find(x => String(x.id) === String(id));
    if(!p) return;
    
    // Llenamos el modal con la información
    document.getElementById("modalNegocio").innerText = p.negocio || "Sin nombre";
    document.getElementById("modalContacto").innerText = p.contacto || "-";
    document.getElementById("modalRubro").innerText = p.rubro || "-";
    document.getElementById("modalDireccion").innerText = p.direccion || "-";
    document.getElementById("modalCorreo").innerText = p.correo || "-";
    document.getElementById("modalPrioridad").innerText = p.prioridad || "-";
    document.getElementById("modalEtiquetas").innerText = p.etiquetas || "-";
    document.getElementById("modalObservaciones").innerText = p.observaciones || "-";
    
    // Mostramos el modal
    document.getElementById("modalDetalle").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modalDetalle").style.display = "none";
}

// --- FUNCIONES NUEVO PROSPECTO ---
function modalNuevoProspecto() {
    document.getElementById('np_negocio').value = "";
    document.getElementById('np_contacto').value = "";
    document.getElementById('np_whatsapp').value = "";
    document.getElementById('modalNuevoProspecto').style.display = 'flex';
}

function guardarProspecto() {
    const negocio = document.getElementById('np_negocio').value;
    const contacto = document.getElementById('np_contacto').value;
    const whatsapp = document.getElementById('np_whatsapp').value;
    
    if(!negocio) {
        alert("El nombre del negocio es obligatorio.");
        return;
    }
    
    // Ocultamos el modal mientras procesa
    document.getElementById('modalNuevoProspecto').style.display = 'none';
    
    // Enviamos los datos a Apps Script
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "createProspecto",
            negocio: negocio,
            contacto: contacto,
            whatsapp: whatsapp
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Recargamos el tablero automáticamente
        } else {
            alert("Error al guardar el prospecto.");
        }
    })
    .catch(error => console.log("Error:", error));
}

// --- FUNCIONES MOVER PROSPECTO ---
function moverProspecto(id) {
    document.getElementById('mover_id').value = id;
    const select = document.getElementById('mover_destino');
    select.innerHTML = ''; // Limpiamos opciones anteriores
    
    // Llenamos el select con las columnas dinámicas de tu BD
    columnas.sort((a,b) => a.orden - b.orden).forEach(col => {
        select.innerHTML += `<option value="${col.id}">${col.nombre}</option>`;
    });
    
    document.getElementById('modalMover').style.display = 'flex';
}

function confirmarMovimiento() {
    const id = document.getElementById('mover_id').value;
    const destinoId = document.getElementById('mover_destino').value;
    
    // Ocultamos el modal
    document.getElementById('modalMover').style.display = 'none';

    // Enviamos la instrucción de cambio de columna a Apps Script
    fetch(API, {
        method: 'POST',
        body: JSON.stringify({
            action: "updateEstado",
            id: id,
            estadoId: destinoId
        })
    })
    .then(r => r.json())
    .then(res => {
        if(res.success){
            iniciar(); // Repintamos el tablero para que la tarjeta salte a su nueva columna
        } else {
            alert("Error al mover el prospecto.");
        }
    })
    .catch(error => console.log("Error:", error));
}
</script>

</body>
</html>
